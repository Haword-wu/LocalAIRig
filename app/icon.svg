<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Blue rounded square background -->
  <rect width="32" height="32" rx="7" fill="#5B6CF5"/>
  <!-- Outer chip frame -->
  <rect x="7" y="7" width="18" height="18" rx="2" stroke="white" stroke-width="1.8" fill="none"/>
  <!-- Inner core -->
  <rect x="11.5" y="11.5" width="9" height="9" fill="white"/>
  <!-- Pins top -->
  <line x1="11.5" y1="4" x2="11.5" y2="7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="20.5" y1="4" x2="20.5" y2="7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Pins bottom -->
  <line x1="11.5" y1="25" x2="11.5" y2="28" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="20.5" y1="25" x2="20.5" y2="28" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Pins left -->
  <line x1="4" y1="11.5" x2="7" y2="11.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="4" y1="20.5" x2="7" y2="20.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Pins right -->
  <line x1="25" y1="11.5" x2="28" y2="11.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="25" y1="20.5" x2="28" y2="20.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
</svg>

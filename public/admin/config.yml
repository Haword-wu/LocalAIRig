backend:
  name: github
  repo: Haword-wu/LocalAIRig
  branch: main
  base_url: https://sveltia-cms-auth.YOUR_WORKER.workers.dev  # ← Sveltia Auth Worker 地址

# 媒体文件存储位置
media_folder: public/images/uploads
public_folder: /images/uploads

# 发布流程（直接发布，不用 draft）
publish_mode: simple

collections:
  # ── 硬件指南 ────────────────────────────────────────
  - name: guides
    label: Hardware Guides
    label_singular: Guide
    folder: content/guides
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", date_only: true }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Category, name: category, widget: hidden, default: guides }
      - label: Tags
        name: tags
        widget: list
        default: ["hardware"]
      - { label: Featured, name: featured, widget: boolean, default: false }
      - { label: Affiliate Disclosure, name: affiliateDisclosure, widget: boolean, default: true }
      - { label: Cover Image, name: coverImage, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }

  # ── 模型指南 ────────────────────────────────────────
  - name: models
    label: Model Guides
    label_singular: Model Guide
    folder: content/models
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", date_only: true }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Category, name: category, widget: hidden, default: models }
      - label: Models
        name: models
        widget: select
        multiple: true
        options:
          - { label: Qwen, value: qwen }
          - { label: LLaMA, value: llama }
          - { label: DeepSeek, value: deepseek }
          - { label: OpenClaw, value: openclaw }
          - { label: Mistral, value: mistral }
          - { label: Gemma, value: gemma }
          - { label: Phi, value: phi }
      - label: Tags
        name: tags
        widget: list
      - { label: Featured, name: featured, widget: boolean, default: false }
      - { label: Affiliate Disclosure, name: affiliateDisclosure, widget: boolean, default: true }
      - { label: Cover Image, name: coverImage, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }

  # ── 使用场景 ────────────────────────────────────────
  - name: use-cases
    label: Use Cases
    label_singular: Use Case
    folder: content/use-cases
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", date_only: true }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Category, name: category, widget: hidden, default: use-cases }
      - label: Use Cases
        name: useCases
        widget: select
        multiple: true
        options:
          - { label: Home User, value: home-user }
          - { label: Gaming PC, value: gaming-pc }
          - { label: Mini PC, value: mini-pc }
          - { label: Mac / Apple Silicon, value: mac-apple-silicon }
          - { label: Budget Build, value: budget-build }
          - { label: High Performance, value: high-performance }
          - { label: Coding Assistant, value: coding-assistant }
          - { label: Creative Writing, value: creative-writing }
      - label: Tags
        name: tags
        widget: list
      - { label: Featured, name: featured, widget: boolean, default: false }
      - { label: Affiliate Disclosure, name: affiliateDisclosure, widget: boolean, default: true }
      - { label: Cover Image, name: coverImage, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }

  # ── 博客 ────────────────────────────────────────────
  - name: blog
    label: Blog
    label_singular: Post
    folder: content/blog
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", date_only: true }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Category, name: category, widget: hidden, default: blog }
      - label: Tags
        name: tags
        widget: list
      - { label: Featured, name: featured, widget: boolean, default: false }
      - { label: Affiliate Disclosure, name: affiliateDisclosure, widget: boolean, default: false }
      - { label: Cover Image, name: coverImage, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }
